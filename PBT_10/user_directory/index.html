<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Directory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>User Directory</h1>
      <input id="searchInput" type="search" placeholder="Tìm theo tên hoặc email">
    </header>
    <section class="content">
      <div class="panel">
        <h2>Users</h2>
        <div id="loading">Loading...</div>
        <div id="message" class="message hidden"></div>
        <table id="userTable">
          <thead>
            <tr><th>ID</th><th>Name</th><th>Email</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="panel">
        <h2 id="formTitle">Thêm user</h2>
        <form id="userForm">
          <input id="nameField" type="text" placeholder="Name" required>
          <input id="emailField" type="email" placeholder="Email" required>
          <input id="phoneField" type="text" placeholder="Phone">
          <button type="submit">Save</button>
          <button type="button" id="cancelEdit" class="secondary hidden">Cancel</button>
        </form>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
