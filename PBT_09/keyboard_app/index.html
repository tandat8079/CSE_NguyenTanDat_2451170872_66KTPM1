<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Keyboard Gallery</h1>
    <div class="viewer" id="viewer">
      <img id="displayImage" src="" alt="Gallery image">
      <div class="caption" id="caption"></div>
    </div>
    <div class="controls">
      <button id="prevBtn">Previous</button>
      <button id="playBtn">Play</button>
      <button id="nextBtn">Next</button>
    </div>
    <div class="info">
      <p>Use ← → to move, 1-9 to jump, Space to play/pause, Ctrl+K to open commands.</p>
    </div>
  </div>
  <div class="palette hidden" id="palette">
    <div class="palette-box">
      <input id="commandInput" type="text" placeholder="Type a command...">
      <ul id="commandList"></ul>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
