<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Tailwind Landing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="dark:bg-gray-900 dark:text-white transition-colors duration-300">
    <nav class="flex justify-between items-center p-4 bg-white dark:bg-gray-800 shadow-md">
        <div class="font-bold text-xl">Logo</div>
        <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">Cart</button>
    </nav>

    <section class="w-full bg-blue-50 dark:bg-gray-700 py-20 text-center">
        <h1 class="text-4xl font-bold mb-4">Welcome to Store</h1>
        <button class="bg-blue-600 text-white px-6 py-3 rounded-lg shadow hover:bg-blue-700">Shop Now</button>
    </section>

    <main class="container mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md hover:shadow-xl transition-shadow p-4 border dark:border-gray-700">
                <div class="w-full h-48 bg-gray-200 dark:bg-gray-600 rounded mb-4"></div>
                <h3 class="font-bold text-lg">Product 1</h3>
                <p class="text-gray-500 dark:text-gray-400">$99.99</p>
            </div>
            </div>
    </main>

    <footer class="grid grid-cols-2 md:grid-cols-4 gap-4 p-6 bg-gray-100 dark:bg-gray-950 mt-10 text-center">
        <div>Link 1</div><div>Link 2</div><div>Link 3</div><div>Link 4</div>
    </footer>
</body>
</html>
