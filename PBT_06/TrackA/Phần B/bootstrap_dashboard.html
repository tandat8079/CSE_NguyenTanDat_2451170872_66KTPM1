<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        <div class="bg-dark text-white p-3 position-fixed h-100" style="width: 250px;">
            <h4>Admin</h4>
            <div class="list-group list-group-flush">
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white border-secondary">Dashboard</a>
            </div>
        </div>

        <div class="flex-grow-1 p-4" style="margin-left: 250px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="#">Home</a></li>
                        <li class="breadcrumb-item active">Dashboard</li>
                    </ol>
                </nav>
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">User</button>
                    <ul class="dropdown-menu"><li><a class="dropdown-item" href="#">Logout</a></li></ul>
                </div>
            </div>

            <div class="alert alert-success" role="alert">Đăng nhập thành công!</div>

            <div class="row g-3 mb-4">
                <div class="col-md-3"><div class="card bg-primary text-white p-3">Users</div></div>
                <div class="col-md-3"><div class="card bg-success text-white p-3">Sales</div></div>
                <div class="col-md-3"><div class="card bg-warning text-dark p-3">Orders</div></div>
                <div class="col-md-3"><div class="card bg-danger text-white p-3">Issues</div></div>
            </div>

            <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="Tìm kiếm...">
                <button class="btn btn-outline-secondary" type="button">Filter</button>
            </div>
            <table class="table table-striped table-hover mb-4">
                <thead><tr><th>ID</th><th>Order</th><th>Status</th></tr></thead>
                <tbody><tr><td>1</td><td>Item A</td><td>Done</td></tr></tbody>
            </table>

            <div class="accordion" id="faqAccordion">
                <div class="accordion-item">
                    <h2 class="accordion-header"><button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#faq1">Câu hỏi 1</button></h2>
                    <div id="faq1" class="accordion-collapse collapse show"><div class="accordion-body">Trả lời 1</div></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
