<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Landing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="#">Logo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search">
                    <button class="btn btn-outline-success" type="submit">Cart (0)</button>
                </form>
            </div>
        </div>
    </nav>

    <div id="hero" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active bg-dark text-white p-5 text-center">Slide 1</div>
            <div class="carousel-item bg-secondary text-white p-5 text-center">Slide 2</div>
            <div class="carousel-item bg-primary text-white p-5 text-center">Slide 3</div>
        </div>
    </div>

    <div class="container my-5">
        <div class="row g-4">
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card position-relative">
                    <span class="badge bg-danger position-absolute top-0 start-0 m-2">Sale</span>
                    <img src="https://placehold.co/400" class="card-img-top" alt="Product">
                    <div class="card-body">
                        <h5 class="card-title">Product 1</h5>
                        <p class="card-text">$99.00</p>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#quickViewModal">Xem nhanh</button>
                    </div>
                </div>
            </div>
            </div>
    </div>

    <div class="modal fade" id="quickViewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Chi tiết sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">Thông tin chi tiết ở đây...</div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">Footer content</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
