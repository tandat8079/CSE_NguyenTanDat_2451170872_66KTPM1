<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="responsive.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">ShopTLU</div>

      <button class="hamburger">☰</button>

      <nav class="nav">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
      </nav>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <h2>Bộ lọc</h2>

        <select>
          <option>Điện thoại</option>
          <option>Laptop</option>
          <option>Tablet</option>
        </select>
      </aside>

      <main class="products">
        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product" />
          <h3>iPhone 16</h3>
          <p>25.990.000đ</p>
        </div>

        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product" />
          <h3>Galaxy S26</h3>
          <p>22.990.000đ</p>
        </div>

        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product" />
          <h3>MacBook Pro</h3>
          <p>45.990.000đ</p>
        </div>

        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product" />
          <h3>iPad Pro</h3>
          <p>28.990.000đ</p>
        </div>

        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product" />
          <h3>AirPods Pro</h3>
          <p>6.990.000đ</p>
        </div>

        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product" />
          <h3>Apple Watch</h3>
          <p>9.990.000đ</p>
        </div>

        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product" />
          <h3>Xiaomi Pad</h3>
          <p>12.990.000đ</p>
        </div>

        <div class="card">
          <img src="https://placehold.co/300x200" alt="Product" />
          <h3>Asus ROG</h3>
          <p>39.990.000đ</p>
        </div>
      </main>

      <aside class="ads">
        <img src="https://placehold.co/200x600" alt="Ads" />
      </aside>
    </div>

    <footer class="footer">
      <p>© 2026 ShopTLU</p>
    </footer>
  </body>
</html>
