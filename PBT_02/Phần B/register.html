<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản </title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        fieldset { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
        legend { font-weight: bold; font-size: 1.1em; padding: 0 10px; }
        label { display: block; margin: 10px 0 5px; font-weight: 500; }
        input, select, textarea, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: auto;
            padding: 12px 24px;
            margin-right: 10px;
            font-size: 1em;
        }
        .submit-btn { background: #28a745; color: white; border: none; }
        .reset-btn { background: #dc3545; color: white; border: none; }
    </style>
</head>
<body>
    <h1>Đăng Ký Tài Khoản</h1>
    <form action="#" method="POST">
        
        <!-- Fieldset 1: Thông tin cá nhân -->
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <label for="fullname">Họ và tên:</label>
            <input type="text" id="fullname" name="fullname" 
                   required minlength="2" maxlength="50" 
                   placeholder="Nguyễn Văn A">
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" 
                   required placeholder="example@email.com">
            
            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" 
                   pattern="[0-9]{10}" 
                   placeholder="0901234567" required>
            
            <label for="dob">Ngày sinh:</label>
            <input type="date" id="dob" name="dob" 
                   max="2026-04-24" required> <!-- max = ngày hiện tại (24/04/2026) -->
        </fieldset>
        
        <!-- Fieldset 2: Tài khoản -->
        <fieldset>
            <legend>Tài khoản</legend>
            
            <label for="username">Tên đăng nhập:</label>
            <input type="text" id="username" name="username" 
                   pattern="^[a-zA-Z0-9_]{3,20}$" 
                   placeholder="user123" required>
            
            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" name="password" 
                   minlength="8" 
                   pattern="(?=.*[A-Z])(?=.*\d).{8,}" 
                   title="Ít nhất 8 ký tự, có 1 chữ hoa và 1 số" 
                   placeholder="Mật khẩu mạnh" required>
            
            <label for="confirm_password">Xác nhận mật khẩu:</label>
            <input type="password" id="confirm_password" name="confirm_password" 
                   minlength="8" placeholder="Nhập lại mật khẩu" required>
            <!-- Lưu ý: HTML5 không thể validate confirm password khớp với password gốc -->
        </fieldset>
        
        <!-- Fieldset 3: Thông tin giao hàng -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>
            
            <label for="city">Thành phố / Tỉnh:</label>
            <select id="city" name="city" required>
                <option value="">-- Chọn thành phố --</option>
                <option value="Hanoi">Hà Nội</option>
                <option value="HCMC">TP. Hồ Chí Minh</option>
                <option value="Danang">Đà Nẵng</option>
                <option value="Haiphong">Hải Phòng</option>
                <option value="Cantho">Cần Thơ</option>
                <option value="Hue">Huế</option>
            </select>
            
            <label for="district">Quận / Huyện:</label>
            <select id="district" name="district" required>
                <option value="">-- Chọn quận/huyện --</option>
                <option value="q1">Quận 1</option>
                <option value="q3">Quận 3</option>
                <option value="bt">Bình Thạnh</option>
                <option value="hn1">Hoàn Kiếm</option>
                <option value="dn1">Hải Châu</option>
            </select>
            
            <label for="address">Địa chỉ chi tiết:</label>
            <textarea id="address" name="address" rows="3" 
                      placeholder="Số nhà, tên đường, phường/xã..." required></textarea>
            
            <label>Giới tính:</label>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Nam</label>
            
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Nữ</label>
            
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Khác</label>
        </fieldset>
        
        <!-- Checkbox điều khoản -->
        <label>
            <input type="checkbox" name="agree" required>
            Tôi đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a>
        </label>
        
        <br><br>
        <button type="submit" class="submit-btn">Đăng ký</button>
        <button type="reset" class="reset-btn">Xóa form</button>
    </form>
</body>
</html>
