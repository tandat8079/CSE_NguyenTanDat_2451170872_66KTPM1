<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2 - Selectors Test</title>
    <style>
        h1 { color: red; }
        .price { color: blue; font-weight: bold; }
        #app header { border: 2px solid green; padding: 10px; }
        nav a:first-child { background: yellow; }
        .product.featured h2 { color: purple; }
        article > p { background: #f0f0f0; }
        a[href="/"] { font-size: 1.2em; }
        .top-bar.dark h1 { color: orange; text-decoration: underline; }
    </style>
</head>
<body>
    <div id="app">
        <header class="top-bar dark">
            <h1>ShopTLU</h1>
            <nav>
                <a href="/" class="active">Home</a>
                <a href="/products">Products</a>
                <a href="/about">About</a>
            </nav>
        </header>
        <main>
            <article class="product">
                <h2>iPhone 16</h2>
                <p class="price">25.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
            <article class="product featured">
                <h2>MacBook Pro</h2>
                <p class="price">45.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
        </main>
    </div>
</body>
</html>
