<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C1 - Debug Layout</title>
    <link rel="stylesheet" href="debug_layout.css">
</head>
<body>
    <h1>Debug Layout - Float 2 cột</h1>
    
    <div class="container">
        <div class="sidebar">
            <h3>Sidebar</h3>
            <p>Chiều rộng: 300px + padding + border</p>
        </div>
        <div class="content">
            <h3>Content</h3>
            <p>Chiều rộng: 660px + padding + border</p>
            <p>Layout này sẽ bị vỡ nếu dùng content-box.</p>
        </div>
    </div>

    <h2 style="margin-top:50px;">Sau khi sửa (border-box)</h2>
    <div class="container fixed">
        <div class="sidebar fixed">
            <h3>Sidebar (Fixed)</h3>
        </div>
        <div class="content fixed">
            <h3>Content (Fixed)</h3>
        </div>
    </div>
</body>
</html>
