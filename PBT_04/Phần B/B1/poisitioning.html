<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1 - CSS Positioning Playground</title>
    <link rel="stylesheet" href="positioning.css">
</head>
<body>
    <!-- Fixed Header -->
    <header class="fixed-header">
        <div class="header-content">
            <div class="logo">🛒 SHOPVN</div>
            <nav class="nav">
                <a href="#">Trang chủ</a>
                <a href="#">Sản phẩm</a>
                <a href="#">Khuyến mãi</a>
                <a href="#">Liên hệ</a>
            </nav>
            <div class="header-right">
                <button class="cart-btn">🛍️ Giỏ hàng</button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Sticky Sidebar -->
        <aside class="sticky-sidebar">
            <h3>Danh mục</h3>
            <ul>
                <li>Điện thoại</li>
                <li>Laptop</li>
                <li>Tablet</li>
                <li>Phụ kiện</li>
                <li>Đồng hồ</li>
            </ul>
            <h3>Lọc giá</h3>
            <p>Giá: 5 - 50 triệu</p>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <h1>Sản phẩm nổi bật</h1>
            
            <div class="products-grid">
                <!-- Product Card 1 -->
                <div class="product-card">
                    <div class="badge-hot">HOT</div>
                    <img src="https://picsum.photos/300/200?random=1" alt="Product 1">
                    <h3>iPhone 15 Pro</h3>
                    <p class="price">28.990.000 ₫</p>
                    <button class="buy-btn">Mua ngay</button>
                </div>

                <!-- Product Card 2 -->
                <div class="product-card">
                    <div class="badge-hot">HOT</div>
                    <img src="https://picsum.photos/300/200?random=2" alt="Product 2">
                    <h3>MacBook Air M3</h3>
                    <p class="price">32.990.000 ₫</p>
                    <button class="buy-btn">Mua ngay</button>
                </div>

                <div class="product-card">
                    <img src="https://picsum.photos/300/200?random=3" alt="Product 3">
                    <h3>Samsung Galaxy S24</h3>
                    <p class="price">22.500.000 ₫</p>
                    <button class="buy-btn">Mua ngay</button>
                </div>

                <div class="product-card">
                    <img src="https://picsum.photos/300/200?random=4" alt="Product 4">
                    <h3>AirPods Pro 2</h3>
                    <p class="price">5.990.000 ₫</p>
                    <button class="buy-btn">Mua ngay</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Scroll to Top Button -->
    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="scroll-top-btn" id="scrollTop">
        ↑
    </button>

    <script>
        // Hiển thị nút scroll to top khi scroll xuống
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTop');
            if (window.scrollY > 300) {
                btn.style.display = 'flex';
            } else {
                btn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
